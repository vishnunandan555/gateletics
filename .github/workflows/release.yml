name: Build & Release App

on:
  push:
    tags:
      - 'v*' # Triggers on tag push starting with 'v' (e.g., v1.0.0)
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Required to create/upload release assets

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Build Android APK and AAB
  # -------------------------------------------------------------------------
  build-android:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Isar Models)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Prepare Android Artifacts
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/gate-tracker.apk
          cp build/app/outputs/bundle/release/app-release.aab artifacts/gate-tracker.aab

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: artifacts/

  # -------------------------------------------------------------------------
  # Job 2: Build Windows Desktop App (ZIP)
  # -------------------------------------------------------------------------
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Isar Models)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Windows App
        run: flutter build windows --release

      - name: Compress Windows Release Bundle (Executable + DLLs)
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath gate-tracker-windows.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: gate-tracker-windows.zip

  # -------------------------------------------------------------------------
  # Job 3: Build Linux Desktop App (TAR.GZ)
  # -------------------------------------------------------------------------
  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Build Prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Isar Models)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Linux App
        run: flutter build linux --release

      - name: Compress Linux Release Bundle (Tarball)
        run: |
          tar -czf gate-tracker-linux.tar.gz -C build/linux/x64/release/bundle .

      - name: Package Linux Desktop App as AppImage
        run: |
          # 1. Download official AppImage compiler tool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          # 2. Build AppDir directory structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share
          
          # 3. Copy compiled files into AppDir
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          
          # 4. Create AppRun launch script
          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/usr/bin/gate_tracker" "$@"
          EOF
          chmod +x AppDir/AppRun
          
          # 5. Create desktop entry file
          cat << 'EOF' > AppDir/gate_tracker.desktop
          [Desktop Entry]
          Name=GATE Tracker
          Exec=gate_tracker
          Icon=gate_tracker
          Type=Application
          Categories=Utility;
          EOF
          
          # 6. Copy icon file
          cp icon.png AppDir/gate_tracker.png
          
          # 7. Compile the AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir gate-tracker-linux.AppImage

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            gate-tracker-linux.tar.gz
            gate-tracker-linux.AppImage

  # -------------------------------------------------------------------------
  # Job 4: Pull and Publish to GitHub Releases
  # -------------------------------------------------------------------------
  create-release:
    name: Create Consolidated GitHub Release
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Create Release Directory
        run: mkdir -p release-files

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: release-files

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-files

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: release-files

      - name: Publish Compiled Packages to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-files/gate-tracker.apk
            release-files/gate-tracker.aab
            release-files/gate-tracker-windows.zip
            release-files/gate-tracker-linux.tar.gz
            release-files/gate-tracker-linux.AppImage
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
