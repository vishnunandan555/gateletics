<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GATEletics — A syllabus and resource tracker for GATE exam preparation.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GATEletics">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>GATEletics</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preload" href="sql-wasm.wasm" as="fetch" type="application/wasm" crossorigin="anonymous">
  <link rel="preload" href="sql-wasm.js" as="script">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #09090b;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }
    #loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #09090b;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.5s ease-out;
      opacity: 1;
    }
    .loader-box {
      text-align: center;
      padding: 40px;
      border-radius: 24px;
      background: #18181b; /* Solid dark card, no gradients */
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      max-width: 440px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }
    .logo-text {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #10b981; /* Solid emerald green, no gradients */
      margin-bottom: 8px;
    }
    .subtitle-text {
      color: #71717a;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 32px;
    }
    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
      position: relative;
    }
    #progress-bar-fill {
      height: 100%;
      width: 30%;
      background: #10b981; /* Solid emerald green, no gradients */
      border-radius: 2px;
      position: absolute;
      left: -30%;
      animation: loading-anim 1.5s infinite linear;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.3);
    }
    @keyframes loading-anim {
      0% { left: -30%; }
      50% { left: 40%; width: 40%; }
      100% { left: 100%; }
    }
    .log-text {
      color: #a1a1aa;
      font-size: 13px;
      min-height: 20px;
      transition: opacity 0.2s;
    }
    .error-card {
      display: none;
      margin-top: 24px;
      padding: 16px 20px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 12px;
      text-align: left;
    }
    .error-header {
      color: #ef4444;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .error-body {
      color: #fca5a5;
      font-size: 12px;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>

  <!-- sql.js Configuration: Instruct initSqlJs to resolve the Wasm file correctly from local resources -->
  <script>
    var Module = {
      locateFile: function(file) {
        return file;
      }
    };
  </script>
</head>
<body>
  <!-- Premium Flat Loading Screen -->
  <div id="loading-container">
    <div class="loader-box">
      <div class="logo-text">GATELETICS</div>
      <div class="subtitle-text">Syllabus Progress Tracker</div>
      
      <div class="progress-bar-bg">
        <div id="progress-bar-fill"></div>
      </div>
      
      <div id="loading-log" class="log-text">Loading database & resources...</div>
      
      <!-- Hidden Error Diagnostics Panel -->
      <div id="error-panel" class="error-card">
        <div class="error-header">
          <span>⚠️ Startup Initialization Failure</span>
        </div>
        <div id="error-details" class="error-body"></div>
      </div>
    </div>
  </div>

  <script>
    // 1. Error boundary: Capture startup crashes and display clean diagnostic cards
    window.addEventListener('error', function(e) {
      const errorMsg = e.message || 'Unknown compilation error';
      const errorDetails = e.error ? (e.error.stack || e.error.toString()) : errorMsg;
      
      const logEl = document.getElementById('loading-log');
      if (logEl) logEl.innerText = "An error occurred during startup.";
      
      const fillEl = document.getElementById('progress-bar-fill');
      if (fillEl) {
        fillEl.style.animation = 'none';
        fillEl.style.background = '#ef4444';
        fillEl.style.left = '0';
        fillEl.style.width = '100%';
      }
      
      const panel = document.getElementById('error-panel');
      const details = document.getElementById('error-details');
      if (panel && details) {
        details.innerText = errorDetails;
        panel.style.display = 'block';
      }
    });

    // 2. Helper to log messages in real-time
    function logMessage(text, progressWidth) {
      console.log(text);
    }

    // 3. Dynamic Real-Time Boot Sequence
    async function startBootSequence() {
      try {
        logMessage("[System] Booting GATE Syllabus Tracker...", "15%");
        
        // Step A: Request and Check Persistent Storage
        if (navigator.storage && navigator.storage.persist) {
          logMessage("[Storage] Requesting database persistence...", "30%");
          const persisted = await navigator.storage.persisted();
          if (persisted) {
            logMessage("[Storage] Persistent storage verified! ✓", "45%");
          } else {
            const granted = await navigator.storage.persist();
            if (granted) {
              logMessage("[Storage] Persistence granted by browser! ✓", "45%");
            } else {
              logMessage("[Storage] Operating in sandboxed browser storage.", "45%");
            }
          }
        } else {
          logMessage("[Storage] Browser sandbox storage active.", "45%");
        }

        // Step B: Load SQLite JS script dynamically
        logMessage("[Database] Loading SQLite engine wrapper...", "60%");
        await new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = 'sql-wasm.js';
          script.onload = resolve;
          script.onerror = () => reject(new Error("Failed to load sql-wasm.js. Verify database assets are complete."));
          document.head.appendChild(script);
        });

        // Step C: Compile SQLite WebAssembly Binary
        logMessage("[Database] Compiling SQLite WebAssembly module...", "80%");
        if (typeof initSqlJs !== 'undefined') {
          await initSqlJs({
            locateFile: function(file) {
              return file;
            }
          });
          logMessage("[Database] WebAssembly compiled successfully! ✓", "90%");
        } else {
          throw new Error("initSqlJs is not defined. SQLite loader corrupted.");
        }

        // Step D: Boot Flutter
        logMessage("[Engine] Starting main Flutter instance...", "95%");
      } catch (err) {
        window.dispatchEvent(new ErrorEvent('error', {
          error: err,
          message: err.message
        }));
      }
    }

    // Execute the sequence
    startBootSequence();

    // 4. MutationObserver to fade out loader once the Flutter canvas mounts
    const observer = new MutationObserver(function(mutations, obs) {
      const view = document.querySelector('canvas') || document.querySelector('flutter-view');
      if (view) {
        setTimeout(function() {
          const fill = document.getElementById('progress-bar-fill');
          if (fill) {
            fill.style.animation = 'none';
            fill.style.left = '0';
            fill.style.width = "100%";
          }
          
          setTimeout(function() {
            const loader = document.getElementById('loading-container');
            if (loader) {
              loader.style.opacity = '0';
              setTimeout(function() { loader.remove(); }, 500);
            }
          }, 300);
        }, 200);
        obs.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
