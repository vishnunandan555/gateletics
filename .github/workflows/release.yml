name: Build & Release App

on:
  push:
    tags:
      - 'v*' # Triggers on tag push starting with 'v' (e.g., v1.0.0)
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Required to create/upload release assets

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Build Android APK and AAB
  # -------------------------------------------------------------------------
  build-android:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Drift Models)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Prepare Android Artifacts
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/gateletics.apk
          cp build/app/outputs/bundle/release/app-release.aab artifacts/gateletics.aab

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: artifacts/

  # -------------------------------------------------------------------------
  # Job 2: Build Windows Desktop App (ZIP)
  # -------------------------------------------------------------------------
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Drift Models)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Windows App
        run: flutter build windows --release

      - name: Compress Windows Release Bundle (Executable + DLLs)
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath gateletics-windows.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: gateletics-windows.zip

  # -------------------------------------------------------------------------
  # Job 3: Build Linux Desktop App (TAR.GZ)
  # -------------------------------------------------------------------------
  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Build Prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Drift Models)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Linux App
        run: flutter build linux --release

      - name: Compress Linux Release Bundle (Tarball)
        run: |
          tar -czf gateletics-linux.tar.gz -C build/linux/x64/release/bundle .

      - name: Package Linux Desktop App as AppImage
        run: |
          # 1. Download official AppImage compiler tool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          # 2. Build AppDir directory structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share
          
          # 3. Copy compiled files into AppDir
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          
          # 4. Create AppRun launch script (using echo to avoid heredoc indentation bugs)
          echo '#!/bin/sh' > AppDir/AppRun
          echo 'HERE="$(dirname "$(readlink -f "${0}")")"' >> AppDir/AppRun
          echo 'exec "$HERE/usr/bin/gateletics" "$@"' >> AppDir/AppRun
          chmod +x AppDir/AppRun
          
          # 5. Create desktop entry file
          echo '[Desktop Entry]' > AppDir/gateletics.desktop
          echo 'Name=GATEletics' >> AppDir/gateletics.desktop
          echo 'Exec=gateletics' >> AppDir/gateletics.desktop
          echo 'Icon=gateletics' >> AppDir/gateletics.desktop
          echo 'Type=Application' >> AppDir/gateletics.desktop
          echo 'Categories=Utility;' >> AppDir/gateletics.desktop
          
          # 6. Copy icon file
          cp icon.png AppDir/gateletics.png
          
          # 7. Compile the AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir gateletics-linux.AppImage

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            gateletics-linux.tar.gz
            gateletics-linux.AppImage

  # -------------------------------------------------------------------------
  # Job 4: Build Web App (ZIP Bundle)
  # -------------------------------------------------------------------------
  build-web:
    name: Build Web Target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Drift Models)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Web App
        run: flutter build web --release

      - name: Deploy Static Web Assets to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./build/web
          vercel-version: 54.17.1

      - name: Compress Web Release Bundle (Zip)
        run: |
          cd build/web
          zip -r ../../gateletics-web.zip .
          cd ../..

      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: gateletics-web.zip

  # -------------------------------------------------------------------------
  # Job 5: Pull and Publish to GitHub Releases
  # -------------------------------------------------------------------------
  create-release:
    name: Create Consolidated GitHub Release
    needs: [build-android, build-windows, build-linux, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Create Release Directory
        run: mkdir -p release-files

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: release-files

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-files

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: release-files

      - name: Download Web Artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: release-files

      - name: Publish Compiled Packages to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-files/gateletics.apk
            release-files/gateletics.aab
            release-files/gateletics-windows.zip
            release-files/gateletics-linux.tar.gz
            release-files/gateletics-linux.AppImage
            release-files/gateletics-web.zip
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
