name: Build & Release App

on:
  push:
    tags:
      - 'v*' # Triggers on tag push starting with 'v' (e.g., v1.0.0)
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Required to create/upload release assets

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Build Android APK and AAB
  # -------------------------------------------------------------------------
  build-android:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9] ]]; then
            VERSION="${{ github.ref_name }}"
          else
            PUB_VERSION=$(grep '^version: ' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
            VERSION="v${PUB_VERSION}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Drift Models)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Prepare Android Artifacts
        run: |
          mkdir -p artifacts
          if [ -f android/key.properties ]; then
            echo "Release key.properties found. Copying as release-signed."
            cp build/app/outputs/flutter-apk/app-release.apk artifacts/gateletics-${{ env.VERSION }}-release-signed.apk
            cp build/app/outputs/bundle/release/app-release.aab artifacts/gateletics-${{ env.VERSION }}-release-signed.aab
          else
            echo "Release key.properties NOT found. Copying as debug-signed fallback."
            cp build/app/outputs/flutter-apk/app-release.apk artifacts/gateletics-${{ env.VERSION }}-debug-signed.apk
            cp build/app/outputs/bundle/release/app-release.aab artifacts/gateletics-${{ env.VERSION }}-debug-signed.aab
          fi

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: artifacts/

  # -------------------------------------------------------------------------
  # Job 2: Build Windows Desktop App (ZIP) - Mobile and Desktop UI
  # -------------------------------------------------------------------------
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -match "^v[0-9]") {
            $VERSION = "${{ github.ref_name }}"
          } else {
            $PubLine = Get-Content pubspec.yaml | Select-String "^version:"
            $VERSION = "v" + $PubLine.Line.Split(" ")[1].Split("+")[0]
          }
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Drift Models)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run Flutter Config Only (Generate Platform Files)
        run: flutter build windows --config-only

      - name: Strip Firebase from Windows C++ Build
        shell: bash
        run: python scripts/strip_firebase.py

      - name: Build Windows App (Mobile UI)
        run: flutter build windows --release --no-pub

      - name: Compress Windows Mobile UI Release Bundle
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath gateletics-windows-mobileUI-${{ env.VERSION }}.zip

      - name: Build Windows App (Desktop UI Beta)
        shell: pwsh
        run: |
          $env:FORCE_DESK_UI="true"
          flutter build windows --config-only --dart-define=FORCE_DESK_UI=true
          python scripts/strip_firebase.py
          flutter build windows --release --no-pub --dart-define=FORCE_DESK_UI=true

      - name: Compress Windows Desktop UI Release Bundle
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath gateletics-windows-deskUI-beta-${{ env.VERSION }}.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            gateletics-windows-mobileUI-${{ env.VERSION }}.zip
            gateletics-windows-deskUI-beta-${{ env.VERSION }}.zip

  # -------------------------------------------------------------------------
  # Job 3: Build Linux Desktop App (TAR.GZ / AppImage) - Mobile and Desktop UI
  # -------------------------------------------------------------------------
  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9] ]]; then
            VERSION="${{ github.ref_name }}"
          else
            PUB_VERSION=$(grep '^version: ' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
            VERSION="v${PUB_VERSION}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Linux Build Prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Drift Models)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # --- Build Mobile UI ---
      - name: Build Linux App (Mobile UI)
        run: flutter build linux --release

      - name: Compress Linux Mobile UI Release Bundle (Tarball)
        run: |
          tar -czf gateletics-linux-mobileUI-${{ env.VERSION }}.tar.gz -C build/linux/x64/release/bundle .

      - name: Package Linux Mobile UI App as AppImage
        run: |
          # Download official AppImage compiler tool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          # Build AppDir directory structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share
          
          # Copy compiled files into AppDir
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          
          # Create AppRun launch script
          echo '#!/bin/sh' > AppDir/AppRun
          echo 'HERE="$(dirname "$(readlink -f "${0}")")"' >> AppDir/AppRun
          echo 'exec "$HERE/usr/bin/gateletics" "$@"' >> AppDir/AppRun
          chmod +x AppDir/AppRun
          
          # Create desktop entry file
          echo '[Desktop Entry]' > AppDir/gateletics.desktop
          echo 'Name=GATEletics' >> AppDir/gateletics.desktop
          echo 'Exec=gateletics' >> AppDir/gateletics.desktop
          echo 'Icon=gateletics' >> AppDir/gateletics.desktop
          echo 'Type=Application' >> AppDir/gateletics.desktop
          echo 'Categories=Utility;' >> AppDir/gateletics.desktop
          
          # Copy icon file
          cp assets/icon.png AppDir/gateletics.png
          
          # Compile the AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir gateletics-linux-mobileUI-${{ env.VERSION }}.AppImage
          
          # Clean up AppDir
          rm -rf AppDir

      # --- Build Desktop UI Beta ---
      - name: Build Linux App (Desktop UI Beta)
        run: |
          export FORCE_DESK_UI=true
          flutter build linux --release --dart-define=FORCE_DESK_UI=true

      - name: Compress Linux Desktop UI Release Bundle (Tarball)
        run: |
          tar -czf gateletics-linux-deskUI-beta-${{ env.VERSION }}.tar.gz -C build/linux/x64/release/bundle .

      - name: Package Linux Desktop UI App as AppImage
        run: |
          # Re-download/prepare tool if needed (should already be here)
          chmod +x appimagetool-x86_64.AppImage
          
          # Build AppDir directory structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share
          
          # Copy compiled files into AppDir
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          
          # Create AppRun launch script
          echo '#!/bin/sh' > AppDir/AppRun
          echo 'HERE="$(dirname "$(readlink -f "${0}")")"' >> AppDir/AppRun
          echo 'exec "$HERE/usr/bin/gateletics" "$@"' >> AppDir/AppRun
          chmod +x AppDir/AppRun
          
          # Create desktop entry file
          echo '[Desktop Entry]' > AppDir/gateletics.desktop
          echo 'Name=GATEletics' >> AppDir/gateletics.desktop
          echo 'Exec=gateletics' >> AppDir/gateletics.desktop
          echo 'Icon=gateletics' >> AppDir/gateletics.desktop
          echo 'Type=Application' >> AppDir/gateletics.desktop
          echo 'Categories=Utility;' >> AppDir/gateletics.desktop
          
          # Copy icon file
          cp assets/icon.png AppDir/gateletics.png
          
          # Compile the AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir gateletics-linux-deskUI-beta-${{ env.VERSION }}.AppImage

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            gateletics-linux-mobileUI-${{ env.VERSION }}.tar.gz
            gateletics-linux-mobileUI-${{ env.VERSION }}.AppImage
            gateletics-linux-deskUI-beta-${{ env.VERSION }}.tar.gz
            gateletics-linux-deskUI-beta-${{ env.VERSION }}.AppImage

  # -------------------------------------------------------------------------
  # Job 4: Build Web App (ZIP Bundle)
  # -------------------------------------------------------------------------
  build-web:
    name: Build Web Target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9] ]]; then
            VERSION="${{ github.ref_name }}"
          else
            PUB_VERSION=$(grep '^version: ' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
            VERSION="v${PUB_VERSION}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Drift Models)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Web App
        run: flutter build web --release

      - name: Deploy Static Web Assets to Vercel
        uses: amondnet/vercel-action@v25.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./build/web
          vercel-version: 54.17.1

      - name: Compress Web Release Bundle (Zip)
        run: |
          cd build/web
          zip -r ../../gateletics-web-${{ env.VERSION }}.zip .
          cd ../..

      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: gateletics-web-${{ env.VERSION }}.zip

  # -------------------------------------------------------------------------
  # Job 5: Pull and Publish to GitHub Releases
  # -------------------------------------------------------------------------
  create-release:
    name: Create Consolidated GitHub Release
    needs: [build-android, build-windows, build-linux, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9] ]]; then
            VERSION="${{ github.ref_name }}"
          else
            PUB_VERSION=$(grep '^version: ' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
            VERSION="v${PUB_VERSION}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Release Directory
        run: mkdir -p release-files

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: release-files

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-files

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: release-files

      - name: Download Web Artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: release-files

      - name: Publish Compiled Packages to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-files/gateletics-web-${{ env.VERSION }}.zip
            release-files/gateletics-${{ env.VERSION }}-*.aab
            release-files/gateletics-${{ env.VERSION }}-*.apk
            release-files/gateletics-windows-mobileUI-${{ env.VERSION }}.zip
            release-files/gateletics-linux-mobileUI-${{ env.VERSION }}.AppImage
            release-files/gateletics-linux-mobileUI-${{ env.VERSION }}.tar.gz
            release-files/gateletics-windows-deskUI-beta-${{ env.VERSION }}.zip
            release-files/gateletics-linux-deskUI-beta-${{ env.VERSION }}.AppImage
            release-files/gateletics-linux-deskUI-beta-${{ env.VERSION }}.tar.gz
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
